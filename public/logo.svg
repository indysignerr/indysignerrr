<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" fill="none">
  <!-- Wave organique au-dessus du mot, concentrée sur "In-si" -->
  <path
    d="M 100 50 Q 135 22 170 50 Q 195 28 220 48 Q 250 30 285 50"
    stroke="#0a1f3a"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Dot coral au-dessus du i -->
  <circle cx="212" cy="46" r="5" fill="#d9725e"/>

  <!-- Wordmark italique avec g en coral -->
  <text
    x="280"
    y="130"
    font-family="Fraunces, 'Instrument Serif', Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="500"
    font-size="110"
    text-anchor="middle"
    letter-spacing="-0.025em"
    font-variation-settings="'SOFT' 100, 'WONK' 1, 'opsz' 144"
  >
    <tspan fill="#0a1f3a">Indysi</tspan><tspan fill="#d9725e">g</tspan><tspan fill="#0a1f3a">ner</tspan>
  </text>
</svg>
