<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" fill="#faf8f3"/>

  <!-- Dot coral au-dessus du i -->
  <circle cx="22" cy="16" r="3.5" fill="#d9725e"/>

  <!-- "id" italique serif navy -->
  <text
    x="32"
    y="48"
    font-family="Fraunces, 'Instrument Serif', Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="500"
    font-size="48"
    fill="#0a1f3a"
    text-anchor="middle"
    letter-spacing="-0.03em"
    font-variation-settings="'SOFT' 100, 'WONK' 1, 'opsz' 144"
  >id</text>

  <!-- Swash sur le d (flourish) -->
  <path
    d="M 42 19 Q 50 12 58 15"
    stroke="#0a1f3a"
    stroke-width="1.8"
    stroke-linecap="round"
    fill="none"
  />
</svg>
